server {
    listen 443 ssl;
    server_name inspectmycar.in www.inspectmycar.in;

    ssl_certificate /etc/letsencrypt/live/inspectmycar.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/inspectmycar.in/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:3000;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}

server {
    listen 80;
    server_name inspectmycar.in www.inspectmycar.in;

    return 301 https://inspectmycar.in$request_uri;
}
